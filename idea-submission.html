<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Idea Submission Form</title>
  <meta name="description"
    content="Sustainability Hackathon 2026 organized by IIT Bombay-Honeywell Centre of Excellence for Future Skills & Innovation." />
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Sustainability Hackathon 2026 | IHCFSI",
        "url": "https://events-ihcfsi.org/"
      }
    </script>

  <link rel="icon" type="image/png" href="asset/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="asset/favicon/favicon.svg" />
  <link rel="shortcut icon" href="asset/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="asset/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="asset/favicon/site.webmanifest" />

  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background: #f4f8f6;
      color: #12332a;
      padding: 40px 20px;
    }

    .form-container {
      max-width: 1150px;
      margin: auto;
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 18px 45px rgba(15, 70, 50, 0.12);
    }

    .form-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .form-header h1 {
      color: #0f6b4a;
      font-size: 34px;
      margin-bottom: 8px;
    }

    .section {
      margin-bottom: 35px;
      padding: 28px;
      border: 1px solid #dce9e4;
      border-radius: 16px;
      background: #fbfdfc;
    }

    .section h2 {
      font-size: 22px;
      color: #083d2e;
      margin-bottom: 22px;
      border-left: 5px solid #0f6b4a;
      padding-left: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: span 2;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #263f37;
      line-height: 1.45;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d3e1dc;
      border-radius: 10px;
      font-size: 15px;
      background: #ffffff;
      outline: none;
    }

    input:focus {
      border-color: #0f6b4a;
      box-shadow: 0 0 0 4px rgba(15, 107, 74, 0.12);
    }

    .question-number {
      color: #0f6b4a;
      font-weight: 800;
    }

    .alert {
      display: none;
      margin-bottom: 22px;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 600;
    }

    .alert.success {
      display: block;
      background: #e8f7ef;
      color: #0f6b4a;
      border: 1px solid #b7e3ca;
    }

    .alert.error {
      display: block;
      background: #fff0f0;
      color: #a82424;
      border: 1px solid #f0b6b6;
    }

    .step-navigation {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: -10px;
    }

    .step-spacer {
      flex: 1;
    }

    .nav-btn {
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
    }

    .prev-btn {
      background: #e8f0ed;
      color: #12332a;
    }

    .next-btn {
      background: #0f6b4a;
      color: #ffffff;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(15, 70, 50, 0.15);
    }

    /* Sustainability pillar allocation — stacked bar chart */
    .pillar-chart-wrap {
      margin-top: 16px;
    }

    .pillar-chart-bar {
      display: flex;
      width: 100%;
      height: 34px;
      border-radius: 8px;
      overflow: hidden;
      background: #eef2f0;
      border: 1px solid #d7e0dc;
    }

    .pillar-chart-segment {
      height: 100%;
      width: 0%;
      min-width: 0;
      transition: width 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      white-space: nowrap;
    }

    .pillar-chart-segment .seg-label {
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 0 4px;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.25);
    }

    .pillar-chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-top: 10px;
    }

    .pillar-chart-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #333;
    }

    .pillar-chart-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .form-container {
        padding: 25px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full {
        grid-column: span 1;
      }

      .step-navigation {
        flex-direction: column;
        align-items: stretch;
      }

      .step-spacer {
        display: none;
      }

      .nav-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="form-container">
    <div class="form-header">
      <h1>Idea Submission Form</h1>
    </div>
    <div class="alert" id="formMessage"></div>

    <form id="ideaSubmissionForm">
        <div class="section">
          <h2>Idea Submission</h2>
          <div class="form-grid">

             <div class="form-group full">
             <label>
                <span class="question-number">1.</span>
               Enter your Team Name *
              </label>
                  <input type="text" id="teamName" required>
                </div>

                        <div class="form-group full">
              <label>
                <span class="question-number">2.</span>
                Allocate the percentage contribution of your idea to each sustainability pillar.
                <br><small>The total must equal exactly 100%.</small>
              </label>

              <div class="form-grid">
                <div class="form-group">
                  <label>Environmental (%)</label>
                <input type="number" id="envPct" min="0" max="100" step="1" required>
                </div>
                <div class="form-group">
                <label>Human (%)</label>
                <input type="number" id="humPct" min="0" max="100" step="1" required>
                </div>
                <div class="form-group">
                  <label>Cultural (%)</label>
                <input type="number" id="culPct" min="0" max="100" step="1" required>
                </div>
                <div class="form-group">
                <label>Social (%)</label>
                <input type="number" id="socialPct" min="0" max="100" step="1" required>
                </div>
                <div class="form-group">
                <label>Economic (%)</label>
                <input type="number" id="ecoPct" min="0" max="100" step="1" required>
                </div>
              </div>

              <p id="totalDisplay" style="margin-top:10px;font-weight:700;color:#a82424;">Total: 0%</p>
              <p id="feasibilityError" style="display:none;color:#a82424;font-weight:600;">
                Total percentage must equal exactly 100%.
              </p>

              <div class="pillar-chart-wrap">
                <div class="pillar-chart-bar" id="pillarChartBar" role="img" aria-label="Stacked bar chart of sustainability pillar allocation">
                  <div class="pillar-chart-segment" id="segEnv" style="background:#0f6b4a;"><span class="seg-label"></span></div>
                  <div class="pillar-chart-segment" id="segHum" style="background:#2a9d8f;"><span class="seg-label"></span></div>
                  <div class="pillar-chart-segment" id="segCul" style="background:#e9c46a;"><span class="seg-label"></span></div>
                  <div class="pillar-chart-segment" id="segSocial" style="background:#f4a261;"><span class="seg-label"></span></div>
                  <div class="pillar-chart-segment" id="segEco" style="background:#6a4c93;"><span class="seg-label"></span></div>
                </div>
                <div class="pillar-chart-legend" id="pillarChartLegend">
                  <span class="pillar-chart-legend-item"><span class="pillar-chart-swatch" style="background:#0f6b4a;"></span>Environmental: <span id="legEnv">0%</span></span>
                  <span class="pillar-chart-legend-item"><span class="pillar-chart-swatch" style="background:#2a9d8f;"></span>Human: <span id="legHum">0%</span></span>
                  <span class="pillar-chart-legend-item"><span class="pillar-chart-swatch" style="background:#e9c46a;"></span>Cultural: <span id="legCul">0%</span></span>
                  <span class="pillar-chart-legend-item"><span class="pillar-chart-swatch" style="background:#f4a261;"></span>Social: <span id="legSocial">0%</span></span>
                  <span class="pillar-chart-legend-item"><span class="pillar-chart-swatch" style="background:#6a4c93;"></span>Economic: <span id="legEco">0%</span></span>
                </div>
              </div>

              <!-- Stored as: env-{val},hum-{val},cul-{val},social-{val},eco-{val} -->
            <input type="hidden" id="feasibility" value="env-0,hum-0,cul-0,social-0,eco-0">
            </div>

          </div>
        </div>

      <div class="step-navigation">
        <button class="nav-btn prev-btn" type="button" id="clearBtn">Clear</button>
        <span class="step-spacer"></span>
        <button class="nav-btn next-btn" type="submit">Submit</button>
  </div>
  </form>
  </div>

  <script>
    // ── Supabase setup ─────────────────────────────────────────────────────
    // Replace these with your actual project values (Project Settings → API).
    const SUPABASE_URL = "https://xqxsyqfpkrdowktzyrbo.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_gPnie7ZbzCPdye7ISVXNMg_ZEinVqeW";
    const SUPABASE_TABLE = "Sustainability_pillars"; // change to your actual table name
  
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("ideaSubmissionForm");
    const messageBox = document.getElementById("formMessage");

    // ── Pillar allocation: shared config for inputs, chart segments & legend ──
    const PILLARS = [
      { id: "envPct",    key: "env",    seg: "segEnv",    leg: "legEnv",    label: "Environmental" },
      { id: "humPct",    key: "hum",    seg: "segHum",    leg: "legHum",    label: "Human" },
      { id: "culPct",    key: "cul",    seg: "segCul",    leg: "legCul",    label: "Cultural" },
      { id: "socialPct", key: "social", seg: "segSocial", leg: "legSocial", label: "Social" },
      { id: "ecoPct",    key: "eco",    seg: "segEco",    leg: "legEco",    label: "Economic" },
    ];
    const pillarIds = PILLARS.map(p => p.id);

    function getPillarValues() {
      return PILLARS.map(p => Number(document.getElementById(p.id).value) || 0);
    }

    function getFeasibilityTotal() {
      return getPillarValues().reduce((sum, v) => sum + v, 0);
    }

    function validateFeasibility() {
      const total = getFeasibilityTotal();
      const error = document.getElementById("feasibilityError");

      if (total !== 100) {
        error.style.display = "block";
        document.getElementById("envPct").focus();
        return false;
      }

      error.style.display = "none";
      return true;
    }

    // ── Stacked bar chart: redraws segment widths + legend from live inputs ──
    function updatePillarChart(values, total) {
      values.forEach((value, i) => {
        const pillar = PILLARS[i];
        const segment = document.getElementById(pillar.seg);
        const legendValue = document.getElementById(pillar.leg);
        const widthPct = total > 0 ? (value / total) * 100 : 0;

        segment.style.width = widthPct + "%";
        const segLabel = segment.querySelector(".seg-label");
        segLabel.textContent = widthPct >= 10 ? `${pillar.label} ${value}%` : "";
        segment.title = `${pillar.label}: ${value}%`;

        if (legendValue) legendValue.textContent = value + "%";
      });

      const bar = document.getElementById("pillarChartBar");
      if (bar) {
        bar.setAttribute(
          "aria-label",
          "Sustainability pillar allocation: " +
            PILLARS.map((p, i) => `${p.label} ${values[i]}%`).join(", ") +
            ` (total ${total}%)`
        );
      }
    }

    function updateFeasibility() {
      const [env, hum, cul, social, eco] = getPillarValues();
      const total = env + hum + cul + social + eco;

      const display = document.getElementById("totalDisplay");
      const error = document.getElementById("feasibilityError");

      display.textContent = `Total: ${total}%`;
      display.style.color = total === 100 ? "#0f6b4a" : "#a82424";
      error.style.display = (total > 0 && total !== 100) ? "block" : "none";

      document.getElementById("feasibility").value =
        `env-${env},hum-${hum},cul-${cul},social-${social},eco-${eco}`;

      updatePillarChart([env, hum, cul, social, eco], total);
    }

    pillarIds.forEach(id => {
      document.getElementById(id).addEventListener("input", updateFeasibility);
    });

    updateFeasibility();

    function showMessage(type, text) {
      if (!messageBox) return;
      messageBox.className = "alert " + type;
      messageBox.textContent = text;
      messageBox.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    document.getElementById("clearBtn").addEventListener("click", () => {
      form.reset();
      updateFeasibility();
      messageBox.style.display = "none";
    });

    // ── Final submit: validates, then inserts the idea directly into Supabase ──
    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      if (!validateFeasibility()) {
        showMessage("error", "The five sustainability percentages must add up to exactly 100%.");
        document.getElementById("feasibilityError").scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }

      const submitButton = form.querySelector("button[type='submit']");
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = "Submitting...";
      }

      const [env, hum, cul, social, eco] = getPillarValues();

      const payload = {
        team_name: document.getElementById("teamName").value,
        environmental_pct: env,
        human_pct: hum,
        cultural_pct: cul,
        social_pct: social,
        economic_pct: eco,
        total_pct: getFeasibilityTotal(),
        feasibility: document.getElementById("feasibility").value,
      };

      try {
        const { data, error } = await supabaseClient
          .from(SUPABASE_TABLE)
          .insert([payload])
          .select()
          .single();

        if (error) throw error;

        const ideaCode = data?.id || data?.idea_code || "";
        form.reset();
        showMessage("success", "Idea submitted successfully!" + (ideaCode ? " Your idea code: " + ideaCode : ""));
        updateFeasibility();
      } catch (error) {
        showMessage("error", error.message || "Submission failed. Please try again.");
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = "Submit Idea";
        }
      }
    });
  </script>
</body>

</html>
